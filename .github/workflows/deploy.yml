##
## Auto-deploy Oxy API + Email to DigitalOcean Droplet
##
## Triggers on push to main. SSHs into the droplet, pulls, rebuilds, restarts.
## Same auto-deploy experience as App Platform — push to git, it updates.
##
## Required GitHub Secrets:
##   DROPLET_HOST    - Droplet IP or hostname (e.g., api.oxy.so)
##   DROPLET_USER    - SSH user (e.g., deploy)
##   DROPLET_SSH_KEY - Private SSH key for the deploy user
##
## One-time droplet setup: run scripts/setup-droplet.sh
##

name: Deploy to Droplet

on:
  push:
    branches: [main]

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: REDIS_URL,EMAIL_INBOUND_WEBHOOK_SECRET
          script: |
            set -e
            cd /opt/oxy

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            # Inject REDIS_URL into .env if the secret is set and not already present
            if [ -n "$REDIS_URL" ] && ! grep -q '^REDIS_URL=' .env 2>/dev/null; then
              echo "" >> .env
              echo "REDIS_URL=$REDIS_URL" >> .env
              echo "=== Added REDIS_URL to .env ==="
            fi

            # Inject EMAIL_INBOUND_WEBHOOK_SECRET into .env
            if [ -n "$EMAIL_INBOUND_WEBHOOK_SECRET" ]; then
              if grep -q '^EMAIL_INBOUND_WEBHOOK_SECRET=' .env 2>/dev/null; then
                sed -i "s|^EMAIL_INBOUND_WEBHOOK_SECRET=.*|EMAIL_INBOUND_WEBHOOK_SECRET=$EMAIL_INBOUND_WEBHOOK_SECRET|" .env
              else
                echo "" >> .env
                echo "EMAIL_INBOUND_WEBHOOK_SECRET=$EMAIL_INBOUND_WEBHOOK_SECRET" >> .env
              fi
              echo "=== Configured EMAIL_INBOUND_WEBHOOK_SECRET ==="
            fi

            # Migrate SMTP TLS cert paths from api.oxy.so to mail.oxy.so
            if grep -q '^SMTP_TLS_\(KEY\|CERT\)=.*api\.oxy\.so' .env 2>/dev/null; then
              sed -i '/^SMTP_TLS_KEY=/s|api\.oxy\.so|mail.oxy.so|g' .env
              sed -i '/^SMTP_TLS_CERT=/s|api\.oxy\.so|mail.oxy.so|g' .env
              echo "=== Updated TLS cert paths to mail.oxy.so ==="
            fi

            echo "=== Building ==="
            docker compose build api

            echo "=== Restarting ==="
            docker compose up -d caddy api

            echo "=== Cleanup ==="
            docker image prune -f

            echo "=== Status ==="
            docker compose ps

            echo "=== Health check ==="
            sleep 10
            if ! docker compose exec -T api curl -sf http://localhost:8080/health; then
              echo "Health check failed! Showing recent logs:"
              docker compose logs --tail=50 api
              exit 1
            fi
            echo "Health check passed"

            echo "=== Recent logs ==="
            docker compose logs --tail=30 api

            echo "Deploy complete!"
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          EMAIL_INBOUND_WEBHOOK_SECRET: ${{ secrets.EMAIL_INBOUND_WEBHOOK_SECRET }}
