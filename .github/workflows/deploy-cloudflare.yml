name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.filter.outputs.accounts }}
      auth: ${{ steps.filter.outputs.auth }}
      inbox: ${{ steps.filter.outputs.inbox }}
      console: ${{ steps.filter.outputs.console }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            accounts:
              - 'packages/accounts/**'
              - 'packages/core/**'
              - 'packages/services/**'
            auth:
              - 'packages/auth/**'
              - 'packages/core/**'
            inbox:
              - 'packages/inbox/**'
              - 'packages/core/**'
              - 'packages/services/**'
            console:
              - 'packages/console/**'
              - 'packages/core/**'
              - 'packages/services/**'

  deploy-auth:
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      # bun 1.3.14 `--frozen-lockfile` false-positives on a perfectly-synced
      # lock (non-deterministic configVersion churn), failing deploys. Lockfile
      # sync is already gated pre-push (test-build) and in PR CI, so the deploy
      # installs without the buggy frozen flag.
      - run: bun install
      # Build the Vite SPA into packages/auth/dist. Post-2c the IdP is a
      # PURE-STATIC SPA: the former `/api/device-accounts` Pages Function was
      # deleted when the IdP moved to the device-first SDK (zero-cookie chooser
      # via useSwitchableAccounts), so there is no `functions/` directory left
      # to compile or deploy.
      - run: bun x turbo run build --filter=auth
      # Deploy the static `dist`. Invoke `bunx wrangler` DIRECTLY rather than
      # cloudflare/wrangler-action: that action's `npx --no-install wrangler`
      # path runs npm's Arborist from packages/auth, which rejects the repo-root
      # `overrides["@oxyhq/bloom"]` against this package's newer direct bloom dep
      # (`npm error code EOVERRIDE`). The whole monorepo installs with bun, and
      # bun's resolver does not perform that npm-only override validation.
      - name: Deploy to Cloudflare Pages
        working-directory: packages/auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@4 pages deploy dist --project-name=oxy-auth --branch=main
      # Post-deploy smoke gate: hit the LIVE host and assert the device-first IdP
      # contract on PUBLIC, unauthenticated endpoints only (no secrets). A broken
      # deploy (blank SPA, or a re-added FedCM manifest / oxy_device cookie lane)
      # turns this job RED immediately. Retries briefly to let the Pages deploy
      # propagate.
      - name: Post-deploy IdP smoke gate
        working-directory: packages/auth
        env:
          SMOKE_TARGET: https://auth.oxy.so
        run: |
          for attempt in 1 2 3 4 5; do
            echo "::group::IdP smoke attempt ${attempt}/5"
            if bun run smoke:idp; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            if [ "${attempt}" -lt 5 ]; then
              echo "Smoke gate failed (edge may still be propagating); retrying in 15s..."
              sleep 15
            fi
          done
          echo "::error::IdP post-deploy smoke gate failed — auth.oxy.so is serving a broken build"
          exit 1

  deploy-accounts:
    needs: detect-changes
    if: needs.detect-changes.outputs.accounts == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      # bun 1.3.14 `--frozen-lockfile` false-positives on a perfectly-synced
      # lock (non-deterministic configVersion churn), failing deploys. Lockfile
      # sync is already gated pre-push (test-build) and in PR CI, so the deploy
      # installs without the buggy frozen flag.
      - run: bun install
      - run: bun x turbo run build --filter=accounts
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/accounts/dist --project-name=oxy-accounts

  deploy-inbox:
    needs: detect-changes
    if: needs.detect-changes.outputs.inbox == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      # bun 1.3.14 `--frozen-lockfile` false-positives on a perfectly-synced
      # lock (non-deterministic configVersion churn), failing deploys. Lockfile
      # sync is already gated pre-push (test-build) and in PR CI, so the deploy
      # installs without the buggy frozen flag.
      - run: bun install
      - run: bun x turbo run build --filter=inbox
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/inbox/dist --project-name=oxy-inbox

  deploy-console:
    needs: detect-changes
    if: needs.detect-changes.outputs.console == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      # bun 1.3.14 `--frozen-lockfile` false-positives on a perfectly-synced
      # lock (non-deterministic configVersion churn), failing deploys. Lockfile
      # sync is already gated pre-push (test-build) and in PR CI, so the deploy
      # installs without the buggy frozen flag.
      - run: bun install
      - run: bun x turbo run build --filter=oxy-console
      - name: Resolve build output directory
        run: |
          if [ -d packages/console/dist ]; then
            echo "DEPLOY_DIR=packages/console/dist" >> $GITHUB_ENV
          elif [ -d packages/console/.output/public ]; then
            echo "DEPLOY_DIR=packages/console/.output/public" >> $GITHUB_ENV
          else
            echo "No build output found" && exit 1
          fi
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ env.DEPLOY_DIR }} --project-name=oxy-console
