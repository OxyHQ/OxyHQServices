name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.filter.outputs.accounts }}
      auth: ${{ steps.filter.outputs.auth }}
      inbox: ${{ steps.filter.outputs.inbox }}
      console: ${{ steps.filter.outputs.console }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            accounts:
              - 'packages/accounts/**'
              - 'packages/core/**'
              - 'packages/services/**'
            auth:
              - 'packages/auth/**'
              - 'packages/core/**'
            inbox:
              - 'packages/inbox/**'
              - 'packages/core/**'
              - 'packages/services/**'
            console:
              - 'packages/console/**'
              - 'packages/core/**'
              - 'packages/auth-sdk/**'

  deploy-auth:
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      # bun 1.3.14 `--frozen-lockfile` false-positives on a perfectly-synced
      # lock (non-deterministic configVersion churn), failing deploys. Lockfile
      # sync is already gated pre-push (test-build) and in PR CI, so the deploy
      # installs without the buggy frozen flag.
      - run: bun install
      # Builds the Vite SPA AND the Cloudflare Pages Function (dist/_worker.js —
      # the /api/device-accounts chooser feed) — see packages/auth `build` ->
      # `build:worker`.
      - run: bun x turbo run build --filter=auth
      # Safety net: regenerate the Pages Function directly (bypasses any stale
      # turbo cache), confirm it is at the dist ROOT (advanced-mode requires
      # `dist/_worker.js` at the upload root), and — critically — RUN the built
      # worker to prove it EXECUTES and routes `/api/device-accounts` to JSON
      # (not just that the file exists). This catches the "worker present but
      # serves SPA HTML" class before deploy.
      - name: Ensure the Pages Function is built and executes
        working-directory: packages/auth
        run: |
          bun run build:worker
          test -f dist/_worker.js || { echo "::error::dist/_worker.js missing — the /api/device-accounts feed would not deploy"; exit 1; }
          echo "dist/_worker.js present ($(wc -c < dist/_worker.js) bytes)"
          bun run scripts/verify-worker.mjs
      # Deploy with a PINNED modern wrangler (4.x). The advanced-mode
      # single-file `_worker.js` upload is verified to work under wrangler 4
      # (`wrangler pages dev dist` compiles + serves the feed as JSON); pinning
      # removes the wrangler-action default-version drift as a variable.
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: pages deploy packages/auth/dist --project-name=oxy-auth --branch=main
      # Post-deploy smoke gate: hit the LIVE host and assert the post-FedCM
      # contract on PUBLIC, unauthenticated endpoints only (no secrets). A broken
      # deploy (blank SPA, missing _worker.js / static-only serving SPA HTML for
      # the /api/device-accounts feed, or a re-added FedCM manifest) turns this
      # job RED immediately. Retries briefly to let the Pages deploy propagate.
      - name: Post-deploy IdP smoke gate
        working-directory: packages/auth
        env:
          SMOKE_TARGET: https://auth.oxy.so
        run: |
          for attempt in 1 2 3 4 5; do
            echo "::group::IdP smoke attempt ${attempt}/5"
            if bun run smoke:idp; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            if [ "${attempt}" -lt 5 ]; then
              echo "Smoke gate failed (edge may still be propagating); retrying in 15s..."
              sleep 15
            fi
          done
          echo "::error::IdP post-deploy smoke gate failed — auth.oxy.so is serving a broken build"
          exit 1

  deploy-accounts:
    needs: detect-changes
    if: needs.detect-changes.outputs.accounts == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      # bun 1.3.14 `--frozen-lockfile` false-positives on a perfectly-synced
      # lock (non-deterministic configVersion churn), failing deploys. Lockfile
      # sync is already gated pre-push (test-build) and in PR CI, so the deploy
      # installs without the buggy frozen flag.
      - run: bun install
      - run: bun x turbo run build --filter=accounts
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/accounts/dist --project-name=oxy-accounts

  deploy-inbox:
    needs: detect-changes
    if: needs.detect-changes.outputs.inbox == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      # bun 1.3.14 `--frozen-lockfile` false-positives on a perfectly-synced
      # lock (non-deterministic configVersion churn), failing deploys. Lockfile
      # sync is already gated pre-push (test-build) and in PR CI, so the deploy
      # installs without the buggy frozen flag.
      - run: bun install
      - run: bun x turbo run build --filter=inbox
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/inbox/dist --project-name=oxy-inbox

  deploy-console:
    needs: detect-changes
    if: needs.detect-changes.outputs.console == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      # bun 1.3.14 `--frozen-lockfile` false-positives on a perfectly-synced
      # lock (non-deterministic configVersion churn), failing deploys. Lockfile
      # sync is already gated pre-push (test-build) and in PR CI, so the deploy
      # installs without the buggy frozen flag.
      - run: bun install
      - run: bun x turbo run build --filter=oxy-console
      - name: Resolve build output directory
        run: |
          if [ -d packages/console/dist ]; then
            echo "DEPLOY_DIR=packages/console/dist" >> $GITHUB_ENV
          elif [ -d packages/console/.output/public ]; then
            echo "DEPLOY_DIR=packages/console/.output/public" >> $GITHUB_ENV
          else
            echo "No build output found" && exit 1
          fi
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ env.DEPLOY_DIR }} --project-name=oxy-console
