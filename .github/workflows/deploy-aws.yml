# Reusable AWS deploy workflow — copy to each repo as .github/workflows/deploy-aws.yml
# and substitute oxy-api (ecs service + ecr repo name) and Dockerfile (path).
name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/core/**'
      - 'packages/contracts/**'
      - 'packages/protocol/**'
      - 'packages/federation/**'
      - 'Dockerfile'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: 237343248947.dkr.ecr.us-west-2.amazonaws.com
  APP: oxy-api
  CLUSTER: oxy-cluster
  DOCKERFILE: Dockerfile

jobs:
  deploy:
    # workflow_dispatch can be run against arbitrary refs; only deploys from the
    # protected main branch may assume the AWS deploy role.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials (OIDC, no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::237343248947:role/oxy-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync API deployment secrets -> SSM (GitHub is the source of truth)
        # Synced secrets use a SYNC_ prefix so they never collide with the AWS
        # CLI's reserved credential env vars (AWS_ACCESS_KEY_ID /
        # AWS_SECRET_ACCESS_KEY / AWS_ENDPOINT_URL). secrets.AWS_ACCESS_KEY_ID is
        # the DO Spaces key, not an AWS IAM key; exporting it under its raw name
        # shadows the OIDC role assumed above and makes `aws ssm put-parameter`
        # fail with UnrecognizedClientException.
        env:
          SYNC_ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          SYNC_REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          SYNC_SSO_INTERNAL_SECRET: ${{ secrets.SSO_INTERNAL_SECRET }}
          SYNC_MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SYNC_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SYNC_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SYNC_AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          SYNC_AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          SYNC_REDIS_URL: ${{ secrets.REDIS_URL }}
          SYNC_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SYNC_STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SYNC_GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          SYNC_ALIA_API_KEY: ${{ secrets.ALIA_API_KEY }}
          SYNC_SMTP_TLS_KEY: ${{ secrets.SMTP_TLS_KEY }}
          SYNC_SMTP_TLS_CERT: ${{ secrets.SMTP_TLS_CERT }}
          SYNC_SMTP_RELAY_USER: ${{ secrets.SMTP_RELAY_USER }}
          SYNC_SMTP_RELAY_PASS: ${{ secrets.SMTP_RELAY_PASS }}
          SYNC_EMAIL_INBOUND_WEBHOOK_SECRET: ${{ secrets.EMAIL_INBOUND_WEBHOOK_SECRET }}
          SYNC_DKIM_PRIVATE_KEY: ${{ secrets.DKIM_PRIVATE_KEY }}
          SYNC_EMAIL_S3_ACCESS_KEY_ID: ${{ secrets.EMAIL_S3_ACCESS_KEY_ID }}
          SYNC_EMAIL_S3_SECRET_ACCESS_KEY: ${{ secrets.EMAIL_S3_SECRET_ACCESS_KEY }}
          SYNC_DEVICE_ID_SALT: ${{ secrets.DEVICE_ID_SALT }}
          SYNC_OXY_PUBLIC_KEY: ${{ secrets.OXY_PUBLIC_KEY }}
          SYNC_OXY_PRIVATE_KEY: ${{ secrets.OXY_PRIVATE_KEY }}
          SYNC_LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          SYNC_LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          # Only sync secrets that the oxy-api ECS task is expected to consume.
          # Do not iterate over the entire GitHub secrets context: this repository also contains
          # credentials for other systems (Cloudflare, legacy droplet deploys,
          # etc.) that must not be copied into the API's SSM namespace.
          SHARED_SECRETS="AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY REDIS_URL LIVEKIT_API_KEY LIVEKIT_API_SECRET"
          API_SECRETS="ACCESS_TOKEN_SECRET REFRESH_TOKEN_SECRET SSO_INTERNAL_SECRET MONGODB_URI AWS_S3_BUCKET AWS_ENDPOINT_URL STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET GITHUB_CLIENT_SECRET ALIA_API_KEY SMTP_TLS_KEY SMTP_TLS_CERT SMTP_RELAY_USER SMTP_RELAY_PASS EMAIL_INBOUND_WEBHOOK_SECRET DKIM_PRIVATE_KEY EMAIL_S3_ACCESS_KEY_ID EMAIL_S3_SECRET_ACCESS_KEY DEVICE_ID_SALT OXY_PUBLIC_KEY OXY_PRIVATE_KEY"

          for k in $SHARED_SECRETS $API_SECRETS; do
            v=$(printenv "SYNC_$k" || true)
            # Defence in depth: a secret left as an empty string or a single
            # dash placeholder is almost always a mistake (forgot to set a
            # value, or scripted with `gh secret set REDIS_URL --body '-'`).
            # Skipping the sync preserves the previous SSM value rather than
            # nuking production with garbage — exactly the failure mode that
            # took the API down in the 2026-06-12 incident.
            if [ -z "$v" ] || [ "$v" = "-" ]; then
              echo "::warning::skip empty/placeholder secret $k (value=${v:-<empty>}); SSM unchanged"
              continue
            fi
            if [ "$k" = "REDIS_URL" ] && [ "$AWS_REGION" = "us-west-2" ] && ! printf '%s' "$v" | grep -q '\.usw2\.cache\.amazonaws\.com'; then
              echo "::warning::skip REDIS_URL because it does not point at the us-west-2 Valkey endpoint; SSM unchanged"
              continue
            fi
            case " $SHARED_SECRETS " in *" $k "*) path="/oxy/_shared/$k";; *) path="/oxy/$APP/$k";; esac
            aws ssm put-parameter --name "$path" --value "$v" --type SecureString --overwrite >/dev/null && echo "synced -> $path"
          done

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push (linux/arm64)
        run: |
          IMG=$ECR_REGISTRY/oxy/$APP
          docker build -f "$DOCKERFILE" -t "$IMG:${{ github.sha }}" -t "$IMG:latest" .
          docker push "$IMG:${{ github.sha }}"
          docker push "$IMG:latest"

      - name: Deploy to ECS (rolling; skipped until the service exists)
        run: |
          STATUS=$(aws ecs describe-services --cluster "$CLUSTER" --services "$APP" --query 'services[0].status' --output text 2>/dev/null || echo NONE)
          if [ "$STATUS" != "ACTIVE" ]; then
            echo "ECS service $APP not created yet — image is in ECR, skipping deploy"
            exit 0
          fi

          aws ecs update-service --cluster "$CLUSTER" --service "$APP" --force-new-deployment >/dev/null
          echo "Forced new deployment for $APP; polling rollout state"

          # Poll the service's PRIMARY deployment until it reaches steady
          # state. AWS's `services-stable` waiter caps at 10 minutes which is
          # too tight when a fresh task pulls the image and warms up against
          # the ALB target group; raise the ceiling to 20 minutes.
          DEADLINE=$(( $(date +%s) + 20 * 60 ))
          while :; do
            now=$(date +%s)
            if [ "$now" -gt "$DEADLINE" ]; then
              echo "::error::Deployment did not stabilize within 20 minutes"
              aws ecs describe-services --cluster "$CLUSTER" --services "$APP" \
                --query 'services[0].deployments' --output table || true
              exit 1
            fi
            PRIMARY=$(aws ecs describe-services --cluster "$CLUSTER" --services "$APP" \
              --query 'services[0].deployments[?status==`PRIMARY`] | [0]')
            ROLLOUT=$(echo "$PRIMARY" | jq -r '.rolloutState // "IN_PROGRESS"')
            RUNNING=$(echo "$PRIMARY" | jq -r '.runningCount // 0')
            DESIRED=$(echo "$PRIMARY" | jq -r '.desiredCount // 0')
            echo "  rolloutState=$ROLLOUT  running=$RUNNING/$DESIRED"
            case "$ROLLOUT" in
              COMPLETED)
                echo "deployed $APP"
                exit 0
                ;;
              FAILED)
                echo "::error::Rollout failed"
                exit 1
                ;;
            esac
            sleep 15
          done
