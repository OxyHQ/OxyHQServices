name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # API Package Tests
  api-test:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: bun install

      # api tests resolve `@oxyhq/core` (e.g. `registrableApex` in
      # fedcm.service.ts) from its published `dist`, like any normal dependency.
      # This job does not build workspace deps, so core's `dist` is absent on a
      # fresh checkout → `Cannot find module '@oxyhq/core'`. Build core (and its
      # own deps `@oxyhq/contracts` and `@oxyhq/protocol`, which core's tsc build
      # needs) in topological order so the import resolves.
      # `@oxyhq/contracts`/`@oxyhq/core/server` are still mapped to source in
      # jest.config.js; this only provides the bare `@oxyhq/core` dist.
      - name: Build core SDK (for @oxyhq/core resolution in api tests)
        run: |
          bun run --filter @oxyhq/contracts build
          bun run --filter @oxyhq/protocol build
          bun run --filter @oxyhq/core build

      - name: Run linter
        run: bun run lint
        working-directory: ./packages/api

      - name: Run tests
        run: bun run test
        working-directory: ./packages/api
        env:
          MONGODB_URI: mongodb://localhost:27017/oxyapi-test
          ACCESS_TOKEN_SECRET: test_access_token_secret_minimum_32_characters
          REFRESH_TOKEN_SECRET: test_refresh_token_secret_minimum_32_characters
          FEDCM_TOKEN_SECRET: test_fedcm_token_secret_minimum_32_characters
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test_aws_access_key
          AWS_SECRET_ACCESS_KEY: test_aws_secret_key
          AWS_S3_BUCKET: test-bucket
          NODE_ENV: test

      - name: Run tests with coverage
        run: bun run test:coverage
        working-directory: ./packages/api
        env:
          MONGODB_URI: mongodb://localhost:27017/oxyapi-test
          ACCESS_TOKEN_SECRET: test_access_token_secret_minimum_32_characters
          REFRESH_TOKEN_SECRET: test_refresh_token_secret_minimum_32_characters
          FEDCM_TOKEN_SECRET: test_fedcm_token_secret_minimum_32_characters
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test_aws_access_key
          AWS_SECRET_ACCESS_KEY: test_aws_secret_key
          AWS_S3_BUCKET: test-bucket
          NODE_ENV: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        with:
          files: ./packages/api/coverage/lcov.info
          flags: api
          name: api-coverage

  # Build check
  api-build:
    name: API Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: bun install

      - name: Build TypeScript
        run: bun run build
        working-directory: ./packages/api

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Run npm audit
        run: npm audit --audit-level=high || true
