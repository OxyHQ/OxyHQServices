# bun test config for the auth (Vite IdP) app.
#
# The preload script registers a jsdom-backed DOM environment AND stubs
# native-only Bloom modules (e.g. `@oxyhq/bloom/avatar`) so client tests can
# import React components that transitively pull `react-native` without bun's
# parser choking on Flow syntax.
[test]
preload = ["./lib/__tests__/preload.ts"]
