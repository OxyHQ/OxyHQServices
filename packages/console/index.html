<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" href="/icon-192.png" sizes="192x192" />
    <link rel="icon" type="image/png" href="/icon-512.png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="Oxy Developers Console" />
    <title>%APP_NAME%</title>
    <!-- Strip device-join credentials before the app bundle loads (mirrors @oxyhq/core). -->
    <script>
      (function(){try{var l=location;if(!l.hash)return;var p=new URLSearchParams(l.hash.charAt(0)==="#"?l.hash.slice(1):l.hash);var d=p.get("oxy_device");var s=p.get("device_secret");if(!d||!s)return;sessionStorage.setItem("oxy.device_join_pending",JSON.stringify({deviceId:d,deviceSecret:s}));history.replaceState(history.state,"",l.pathname+l.search)}catch(e){}})();
    </script>
    <!--
      Pre-mount splash: painted before the JS bundle loads so the first frame
      already shows the Oxy logo + macOS-style loading bar (no blank/"Loading..."
      flash). React replaces #root's children on mount, so this disappears
      naturally. Must visually match src/components/splash-screen.tsx for a
      seamless hand-off. Inline <style> is required here because it has to work
      with zero JS / before the CSS bundle resolves.
    -->
    <style>
      #oxy-boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: #0a0a0a;
      }
      #oxy-boot-splash img {
        width: 80px;
        height: 80px;
        border-radius: 22px;
        user-select: none;
        -webkit-user-drag: none;
      }
      #oxy-boot-splash #oxy-boot-title {
        font-size: 16px;
        font-weight: 500;
        line-height: 1;
        text-align: center;
        color: hsl(0 0% 93%);
      }
      #oxy-boot-splash .oxy-boot-track {
        width: 160px;
        height: 5px;
        border-radius: 9999px;
        background: hsl(277 18% 20%);
        overflow: hidden;
      }
      #oxy-boot-splash .oxy-boot-fill {
        width: 100%;
        height: 100%;
        border-radius: 9999px;
        background: hsl(277 66% 56%);
        transform-origin: left center;
        animation: oxy-boot-sweep 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes oxy-boot-sweep {
        0% {
          transform: translateX(-100%) scaleX(0.4);
        }
        50% {
          transform: translateX(40%) scaleX(0.6);
        }
        100% {
          transform: translateX(150%) scaleX(0.4);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #oxy-boot-splash .oxy-boot-fill {
          animation: none;
          transform: scaleX(0.6);
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-background font-sans antialiased">
    <div id="root">
      <div id="oxy-boot-splash">
        <img src="/icon-192.png" alt="Oxy" width="80" height="80" />
        <div id="oxy-boot-title">%APP_NAME%</div>
        <div class="oxy-boot-track">
          <div class="oxy-boot-fill"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
