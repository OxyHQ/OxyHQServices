##
## Docker Compose — Oxy API
##
## Runs the Express API behind Caddy. Production inbound mail should use
## Cloudflare Email Routing -> Worker -> /email/inbound; public SMTP is not
## exposed from this API container.
##
## Usage:
##   cp .env.example .env       # fill in your values
##   docker compose up -d       # start all services
##   docker compose logs -f     # watch logs
##

services:
  # ─── Oxy API ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oxy-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    expose:
      - "8080"         # HTTP API (Caddy proxies to this)
    env_file:
      - .env
    environment:
      - PORT=8080
      - SMTP_ENABLED=false
    networks:
      - oxy-net

  # ─── Rspamd Spam Filter ─────────────────────────────────────────
  rspamd:
    image: rspamd/rspamd:latest
    container_name: oxy-rspamd
    restart: unless-stopped
    ports:
      - "127.0.0.1:11334:11334"   # Web UI (localhost only, for admin)
    volumes:
      - rspamd-data:/var/lib/rspamd
    networks:
      - oxy-net

  # ─── Caddy Reverse Proxy (auto HTTPS) ───────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: oxy-caddy
    restart: unless-stopped
    ports:
      - "80:80"        # HTTP (redirect to HTTPS + ACME challenges)
      - "443:443"      # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - certs:/certs   # Shared with api for SMTP TLS
    networks:
      - oxy-net

volumes:
  rspamd-data:
  caddy-data:
  caddy-config:
  certs:

networks:
  oxy-net:
    driver: bridge
